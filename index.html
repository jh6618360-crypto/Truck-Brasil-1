<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truck Simulator Road</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
}

header{
    background:#222;
    padding:20px;
    text-align:center;
}

button{
    background:#ff8800;
    color:white;
    border:0;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.container{
    padding:20px;
}

.card{
    background:#222;
    padding:20px;
    margin:15px 0;
    border-radius:12px;
}

h2{
    color:#ff8800;
}
</style>

</head>

<body>

<header>
<h1>🚛 Truck Simulator Road</h1>
<button onclick="login()">Entrar na conta</button>
</header>


<div class="container">

<div class="card">
<h2>📰 Notícias</h2>

<div id="noticias">
Carregando notícias...
</div>

</div>


<div class="card">
<h2>🎯 Eventos</h2>

<div id="eventos">
Nenhum evento ativo.
</div>

</div>


<div class="card">
<h2>👤 Perfil do Jogador</h2>

<div id="perfil">
Nenhum jogador conectado.
</div>

</div>


</div>


<script>

let banco = {

noticias:[
{
titulo:"Atualização 1.0",
texto:"O jogo está em desenvolvimento!"
}
],

eventos:[
{
nome:"Evento de Caminhões",
premio:"10.000 moedas"
}
]

};


function carregar(){

document.getElementById("noticias").innerHTML =
banco.noticias[0].titulo +
"<br>" +
banco.noticias[0].texto;


document.getElementById("eventos").innerHTML =
banco.eventos[0].nome +
"<br>Prêmio: " +
banco.eventos[0].premio;

}


function login(){

let nome = prompt("Digite seu nome:");

if(nome){

localStorage.setItem("jogador",nome);

document.getElementById("perfil").innerHTML =
"Jogador: " + nome;

}

}


carregar();


let jogador = localStorage.getItem("jogador");

if(jogador){

document.getElementById("perfil").innerHTML =
"Jogador: " + jogador;

}

</script>


</body>
</html>
